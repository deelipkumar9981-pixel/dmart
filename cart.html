<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="googlef563f12e6ebc5611.html">
    <title>Dmart - Your Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <script defer src="/_vercel/insights/script.js"></script>
    <link type="text/css" rel="stylesheet" id="dark-mode-custom-link">
    <link type="text/css" rel="stylesheet" id="dark-mode-general-link">
    <style lang="en" type="text/css" id="dark-mode-custom-style"></style>
    <style lang="en" type="text/css" id="dark-mode-native-style"></style>
    <style lang="en" type="text/css" id="dark-mode-native-sheet"></style>
</head>
<body class="bg-gray-50 font-inter" cz-shortcut-listen="true">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="home.html" class="flex items-center space-x-2 text-2xl font-bold text-green-600">
                    <i class="fas "></i><span>  <img src="./cart_files/logo.png" width="100px"> </span>
                </a>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="home.html" class="text-gray-600 hover:text-green-600 font-medium">Home</a>
                    <a href="home.html#featured-grid-section" class="text-gray-600 hover:text-green-600 font-medium">Products</a>
                    <a href="cart.html" class="text-green-600 font-medium">Cart</a>
                    <a href="about.html" class="text-gray-600 hover:text-green-600 font-medium">About Us</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="relative text-green-600">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                        <span id="cart-item-count" class="absolute -top-2 -right-2 bg-green-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Your Shopping Cart</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Cart Items List -->
            <div class="w-full lg:w-2/3">
                <div id="cart-items-container" class="space-y-4"></div>
                <!-- Empty Cart Message -->
                <div id="cart-empty-message" class="bg-white p-12 rounded-lg shadow-md text-center">
                    <i class="fas fa-shopping-basket text-6xl text-gray-300 mb-4"></i>
                    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Your cart is empty</h2>
                    <p class="text-gray-500 mb-6">Looks like you haven't added anything to your cart yet.</p>
                    <a href="home.html#featured-grid-section" class="bg-green-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-green-700 transition duration-300 inline-block">Start Shopping</a>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="w-full lg:w-1/3">
                <div class="bg-white p-6 rounded-lg shadow-md sticky top-24">
                    <h2 class="text-2xl font-semibold border-b pb-4 mb-4">Order Summary</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="cart-subtotal" class="font-medium">&#8377;0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Shipping</span>
                            <span id="cart-shipping" class="font-medium text-green-600">Free</span>
                        </div>
                        <div class="flex justify-between text-xl font-bold text-gray-800 border-t pt-4 mt-4">
                            <span>Total</span>
                            <span id="cart-total">&#8377;0.00</span>
                        </div>
                    </div>
                    <button id="checkout-btn" onclick="window.location.href='checkout.html'" class="w-full bg-green-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-green-700 transition duration-300 mt-6 shadow-md disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- UTILS ---
        const formatCurrency = (amt) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(amt);

        // --- STATE ---
        let cart = JSON.parse(localStorage.getItem('Dmart')) || [];

        // --- LOGIC ---
        const updateHeaderCount = () => {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-item-count').textContent = count;
        };

        const saveCart = () => {
            localStorage.setItem('Dmart', JSON.stringify(cart));
            renderCart();
            updateHeaderCount();
        };

        const updateQuantity = (id, change) => {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.quantity += change;
                if(item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveCart();
            }
        };

        const removeItem = (id) => {
            cart = cart.filter(i => i.id !== id);
            saveCart();
        };

        const renderCart = () => {
            const container = document.getElementById('cart-items-container');
            const emptyMsg = document.getElementById('cart-empty-message');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                checkoutBtn.disabled = true;
                
                // Reset totals
                document.getElementById('cart-subtotal').textContent = formatCurrency(0);
                document.getElementById('cart-total').textContent = formatCurrency(0);
                return;
            }

            emptyMsg.classList.add('hidden');
            checkoutBtn.disabled = false;

            let subtotal = 0;
            container.innerHTML = cart.map(item => {
                subtotal += item.price * item.quantity;
                return `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex flex-col sm:flex-row items-center gap-4">
                        <img src="${item.image}" class="w-24 h-24 object-cover rounded-md">
                        <div class="flex-grow text-center sm:text-left">
                            <h3 class="text-lg font-semibold text-gray-800">${item.name}</h3>
                            <p class="text-gray-500">${formatCurrency(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQuantity(${item.id}, -1)" class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 font-bold">-</button>
                            <span class="w-8 text-center font-semibold">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)" class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 font-bold">+</button>
                        </div>
                        <div class="font-bold text-lg w-24 text-right">
                            ${formatCurrency(item.price * item.quantity)}
                        </div>
                        <button onclick="removeItem(${item.id})" class="text-red-500 hover:text-red-700 p-2">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-subtotal').textContent = formatCurrency(subtotal);
            document.getElementById('cart-total').textContent = formatCurrency(subtotal); // Free shipping logic applied
        };

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            updateHeaderCount();
            renderCart();
        });
    </script>

    </body>
</html>
